---
- name: Deploy Calculator
  hosts: localhost
  # become: yes           # Enable sudo
  # become_method: sudo   # Explicitly use sudo
  # become_user: root     # Run tasks as root
  connection: local
  tasks:
    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Start Docker service
      service:
        name: docker
        state: started

    - name: Pull Docker image
      docker_image:
        name: chahak02/calculator
        source: pull

    - name: Run container
      docker_container:
        name: calculator
        image: chahak02/calculator
        state: started
        ports:
          - "8081:8080"
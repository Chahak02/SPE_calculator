---
- name: Deploy Calculator
  hosts: localhost
  # become: yes           # Enable sudo
  # become_method: sudo   # Explicitly use sudo
  #  become_user: root     # Run tasks as root
  connection: local

  vars:
    image_name: chahak02/calculator
    image_tag: "{{ tag }}"


  tasks:


    #  - name: Install Docker
    #   apt:
    #     name: docker.io
    #     state: present

    # - name: Start Docker service
    #   service:
    #     name: docker
    #     state: started
    - name: Install Python dependencies for Docker modules
      pip:
        name:
          - docker
          - requests
        state: present

    - name: Pull Docker image
      docker_image:
        # name: chahak02/calculator
        name: "{{ image_name }}:{{ image_tag }}"
        source: pull

    - name: Remove old container if exists
      docker_container:
        name: calculator
        state: absent
        force_kill: true

    - name: Run container
      docker_container:
        name: calculator
        # image: chahak02/calculator
        image: "{{ image_name }}:{{ image_tag }}"
        state: started
        restart_policy: always
        # tty: true
        # interactive: true
        detach: true

